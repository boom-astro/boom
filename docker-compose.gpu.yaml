# GPU override — use with: docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml up
# Requires NVIDIA Container Toolkit on the host.

services:
  scheduler-ztf:
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  scheduler-lsst:
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
