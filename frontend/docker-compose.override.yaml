# Local development overrides
# This file is automatically merged with docker-compose.yaml when running `docker-compose up`
# It's useful for local-only settings without modifying the production configuration

networks:
  traefik-public:
    # For local development, we don't need an external network
    external: false

services:
  web:
    ports:
      - "5173:80" # Expose web service on http://localhost:5173
