# GPU override — use with: docker compose -f docker-compose.yaml -f docker-compose.cuda.yaml up
# Requires NVIDIA Container Toolkit on the host.

services:
  scheduler-ztf:
    image: boom-astro/boom-gpu:latest
    build:
      target: app-gpu
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  scheduler-lsst:
    image: boom-astro/boom-gpu:latest
    build:
      target: app-gpu
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
