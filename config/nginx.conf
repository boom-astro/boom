server {
  listen 80;
  server_name _;

  # Enable gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/xhtml+xml
    application/x-font-ttf
    application/x-font-opentype
    application/vnd.ms-fontobject
    image/svg+xml
    image/x-icon
    font/ttf
    font/eot
    font/otf
    font/opentype;
  gzip_disable "msie6";
  gzip_proxied any;

  # Serve the built files from this directory for all locations
  root /usr/share/nginx/html;
  index index.html;

  # Never cache the SPA entrypoint
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  # Cache static assets aggressively (safe for hashed filenames)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|woff2?|ttf|svg|eot|map)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Optional: service worker should not be overly cached
  location = /service-worker.js {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # Proxy requests to the API
  location /api/ {
    # __API_ORIGIN__ is replaced at build time by the Dockerfile
    # Strip the /api prefix so /api/foo -> __API_ORIGIN__/foo
    proxy_pass __API_ORIGIN__/;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  # Handle other requests
  location / {
    try_files $uri $uri/ /index.html;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
