map $host $api_upstream_host {
  # Transform app host (e.g., app.example.com) into api.example.com
  ~^[^.]+\.(?<base>.+)$ api.$base;
  default api.$host;
}

map $api_upstream_host $api_origin {
  default https://$api_upstream_host;
}

server {
  listen 80;
  server_name _;

  # Serve the built files from this directory for all locations
  root /usr/share/nginx/html;
  index index.html;

  # Never cache the SPA entrypoint
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  # Cache static assets aggressively (safe for hashed filenames)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|woff2?|ttf|svg|eot|map)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Optional: service worker should not be overly cached
  location = /service-worker.js {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # Proxy API to the backend, strip /api prefix
  location /api/ {
    resolver 1.1.1.1 1.0.0.1 ipv6=off;
    set $api_host $api_upstream_host;
    proxy_set_header Host $api_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $api_origin;
  }

  # SPA fallback: route non-file requests to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
