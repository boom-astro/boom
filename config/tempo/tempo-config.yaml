server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1000000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h  # 7 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Generate Prometheus-compatible RED metrics from spans (latency, errors, rate)
# so Grafana's service map / RED panels work without extra agents.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  processor:
    service_graphs:
      enable_messaging_system_latency_histogram: true
    span_metrics:
      dimensions:
        - service.namespace

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
    global:
      # Default is 5_000_000 (5 MB). The boom consumer/scheduler currently
      # wrap a long-running `run()` in a single `#[instrument]` span, so all
      # the per-alert child spans end up under one giant trace. Bumping the
      # cap to 50 MB unblocks dev; the proper fix is to stop wrapping `run`
      # in a span so each alert becomes its own root trace.
      max_bytes_per_trace: 50000000

usage_report:
  reporting_enabled: false
