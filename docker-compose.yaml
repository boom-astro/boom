networks:
  traefik-public:
    # Allow setting it to false for testing and local development
    external: true

services:
  web:
    image: boom-astro/boom-web:latest
    hostname: web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BOOM_API__DOMAIN: api.${DOMAIN?Variable not set}
        PRERELEASE_MODE: ${PRERELEASE_MODE:-false}
    environment:
      BOOM_API__DOMAIN: api.${DOMAIN?Variable not set}
      PRERELEASE_MODE: ${PRERELEASE_MODE:-false}
    # ports:
    #   - "5173:80" # map the nginx 80 port to host 5173 for local testing
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME?Variable not set}-web.loadbalancer.server.port=80
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-http.rule=Host(`${WEBAPP_DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-https.rule=Host(`${WEBAPP_DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-https.tls.certresolver=le
      # Define compression middleware
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-compress.compress=true
      # Define Traefik Middleware to handle domain with and without "www" to redirect to only one
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-www-redirect.redirectregex.regex=^http(s)?://www.(${WEBAPP_DOMAIN?Variable not set})/(.*)
      # Redirect a domain with www to non-www
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-www-redirect.redirectregex.replacement=http$${1}://${WEBAPP_DOMAIN?Variable not set}/$${3}
      # Enable www redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-http.middlewares=https-redirect,${STACK_NAME?Variable not set}-www-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-web-https.middlewares=${STACK_NAME?Variable not set}-www-redirect,${STACK_NAME?Variable not set}-compress